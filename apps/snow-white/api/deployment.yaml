# Argo CD injects namespace "snow-white" (the destination) — do not hardcode it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
    env: local
    project: snow-white
    version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        env: local
        project: snow-white
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          # Placeholder HTTP server — swap for your real image (pinned tag, never :latest).
          image: traefik/whoami:v1.10
          args: ["--port", "8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
