# Runs as an Argo CD Sync hook before the rollout. BeforeHookCreation deletes
# the previous Job right before re-creating it, so it can re-run on each sync.
apiVersion: batch/v1
kind: Job
metadata:
  name: migration
  labels:
    app: migration
    env: local
    project: cars
    version: "0.1.0"
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migration
        env: local
        project: cars
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: migration
          # Placeholder migration — replace with your real migration image (pinned tag).
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "running cars migrations..."; sleep 5; echo "migrations complete"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
